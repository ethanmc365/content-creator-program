name: CI

# Runs lint + unit tests + a production build on every push and PR, so a
# regression (or a broken build) is caught before it can reach real creators.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          # Build only needs these to be present; the values are public anyway.
          VITE_SUPABASE_URL: https://heuhqqoxyggawuckxocp.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
